<div class="hdr">

  <div class="mc">
    <div style="font-size:17px;font-weight:700;margin-bottom:6px">⚙ OpenAI APIキーの設定</div>

const SYS_PROMPT=`求人票（画像・複数ページの場合あり）から情報を抽出しジョブメドレー形式のJSONのみ出力（コードブロック・説明文不要）。複数ページは1件の求人として統合する。

【給与（最重要・絶対厳守）】
給与下限・給与上限には「月給額（円）」をそのまま入れる。勝手に割り算・換算は一切しないこと。
1. ハローワーク求人票で「月額（ａ＋ｂ）」の記載がある場合 → その金額（例:236,500円〜293,500円）を給与下限・上限にそのまま使う。これが最優先。
2. 「基本給（月額）」「月給」の記載がある場合 → その月額をそのまま使う。
3. 月額・月給がどこにも無く「年収」しか無い場合に限り → 年収÷12（千円未満切捨）で月給換算する。
※雇用形態がパート・バイトの場合のみ時給額を入れる。
※「19,708円」のような明らかに月給として低すぎる値を出力してはならない。月給は通常15万〜50万円程度。

【給与の備考（必ず下記の2ブロック構成で記載）】
ジョブメドレーの「給与の備考」欄は次の決まった書式で記載する。該当項目が無い場合はその行を省略。

・内訳
基本給:200,000円〜250,000円
職務手当:30,000円〜37,000円
ベースアップ手当:6,500円〜6,500円
固定残業代なし（ある場合は「固定残業代あり ○○円」）

・その他手当
各種認定資格に応じて○○円〜○○円（資格手当がある場合）
夜勤手当:15,000円／回
通勤手当実費支給　上限月額17,500円
昇給制度あり　月あたり○○円〜○○円(実績)
賞与制度あり　年3回　計4.50ヶ月分(実績)
試用期間3ヶ月 同条件

※先頭に「・内訳」「・その他手当」の見出しを必ず付け、両ブロックの間は空行で区切る。
※基本給(a)・定額手当(b)は「・内訳」へ、それ以外の変動手当・昇給・賞与・試用期間は「・その他手当」へ振り分ける。

【その他】
年額（a+b）が月額の意味で使われるハローワーク特有の表記に注意。「月額（ａ＋ｂ）」は必ず月給。
訴求文は300〜500文字で魅力的に作成。
職種カテゴリ名は必ず次のいずれか1つ: 介護 / 医科 / リハビリ/代替医療 / 保育 / 歯科 / ヘルスケア/美容 / その他
職種名は職種カテゴリに応じた標準的な職種名（例:看護師/准看護師、理学療法士、介護職/ヘルパー、医療事務/受付 等）。
不足情報には、求人票から読み取れなかった必須項目（施設名/都道府県/職種カテゴリ名/職種名/雇用形態/給与下限/訴求文タイトル/訴求文/仕事内容/応募要件/勤務時間/休日/待遇）の名称を配列で入れる。

// CONVERSION UTILITIES
// ============================================================

async function callOpenAI(images) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('APIキーが設定されていません。右上の「⚙ OpenAI APIキー設定」から設定してください。');
  // images: [{base64, mimeType}, ...] 複数ページ対応
  const imageContents = images.map(img => ({
    type:'image_url',
    image_url:{url:`data:${img.mimeType};base64,${img.base64}`, detail:'high'}
  }));
  const pageNote = images.length > 1
    ? `この求人票は${images.length}ページで1セットです。全ページを統合して1件の求人情報としてJSONで出力してください。`
    : 'この求人票の情報を抽出してJSONで出力してください。';
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
    body: JSON.stringify({
      model: 'gpt-4o',
      max_tokens: 2500,
      messages: [
        {role:'system', content: SYS_PROMPT},
        {role:'user', content: [...imageContents, {type:'text', text: pageNote}]}
      ]
    })
  });
  if (!res.ok) {
    let msg = `HTTP ${res.status}`;
    try { const d = await res.json(); msg = d.error?.message || msg; } catch {}
    throw new Error(`OpenAI API エラー: ${msg}`);
  }
  const data = await res.json();
  const txt = data.choices[0].message.content;
  const clean = txt.replace(/^```(?:json)?\s*|\s*```$/gm,'').trim();
  return JSON.parse(clean);
}

async function pdfToImages(file, onProgress) {
  if (typeof pdfjsLib === 'undefined') throw new Error('PDF.jsが読み込まれていません。インターネット接続を確認してください。');
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: buf}).promise;
  const numPages = pdf.numPages;
  const images = [];
  for (let p = 1; p <= numPages; p++) {
    if (onProgress) onProgress(p, numPages);
    const page = await pdf.getPage(p);
    const vp = page.getViewport({scale: 2.0});
    const canvas = document.createElement('canvas');
    canvas.width = vp.width; canvas.height = vp.height;
    await page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise;
    const url = canvas.toDataURL('image/jpeg', 0.82);
    images.push({base64: url.split(',')[1], mimeType:'image/jpeg', previewUrl: url});
  }
  return images;
}

function imgToBase64(file) {
  return new Promise((res,rej) => {
    const r = new FileReader();
    r.onload = e => res({base64: e.target.result.split(',')[1], mimeType: file.type, previewUrl: e.target.result});
    r.onerror = rej; r.readAsDataURL(file);
  });
}

    h += `<div class="card"><div style="font-weight:700;font-size:14px;margin-bottom:10px">元ファイル${(s.previewUrls&&s.previewUrls.length>1)?`（${s.previewUrls.length}ページ）`:''}</div>`;
    if (s.previewUrls && s.previewUrls.length) h += s.previewUrls.map((u,i)=>`<div style="margin-bottom:8px">${s.previewUrls.length>1?`<div style="font-size:11px;color:#aaa;margin-bottom:2px">ページ ${i+1}</div>`:''}<img src="${u}" alt="元ファイル ページ${i+1}" style="width:100%;border-radius:6px;border:1px solid #eee"></div>`).join('');
    else h += `<div style="background:#f5f5f5;border-radius:6px;padding:10px;font-size:12px;color:#888;margin-bottom:10px">📄 ${esc(s.file?.name||'')}</div>`;
    h += `<div style="font-size:12px;font-weight:700;color:#666;margin-bottom:6px">抽出された主要情報</div>`;
    [['施設名',s.jm.施設名],['職種',s.jm.職種名],['雇用形態',s.jm.雇用形態],['給与下限',s.jm.給与下限?`月 ${Number(s.jm.給与下限||0).toLocaleString()}円〜`:''],['都道府県',s.jm.都道府県]].forEach(([l,v])=>{
      if(v) h+=`<div style="font-size:12px;margin-bottom:3px;display:flex;gap:6px"><span style="color:#aaa;min-width:50px">${l}</span><span style="font-weight:700">${esc(v)}</span></div>`;
    });
    h += `</div>`;
    // Drafts
    const drafts = getDrafts();
    h += `<div class="card"><div onclick="toggleD()" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none"><div style="font-weight:700;font-size:13px">📁 保存済み下書き (${drafts.length})</div><span style="color:#bbb">${s.dOpen?'▲':'▼'}</span></div>`;
    if (s.dOpen) {
      h += `<div style="margin-top:10px">`;
      if (!drafts.length) h += `<div style="font-size:12px;color:#bbb;padding:4px 0">保存済みの下書きはありません</div>`;
      drafts.forEach(d => {
        h += `<div style="border-top:1px solid #f5f5f5;padding-top:8px;margin-top:8px">
          <div style="font-size:13px;font-weight:700">${esc(d.fac)}</div>
          <div style="font-size:11px;color:#bbb">${esc(d.job)} · ${esc(d.at)}</div>
          <div style="display:flex;gap:6px;margin-top:6px">
            <button class="btn-sec" style="flex:1;font-size:12px;padding:3px 0" onclick="loadD('${d.id}')">読み込む</button>
            <button class="btn-del" style="flex:1" onclick="rmD('${d.id}')">削除</button>
          </div></div>`;
      });
      h += `</div>`;
    }
    h += `</div></div>`;
    // Right: Edit form
    h += `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-weight:700;font-size:15px">✏️ ジョブメドレー形式（編集可）</div>
      <div style="display:flex;gap:8px;align-items:center">
        ${s.saveMsg?`<span style="font-size:12px;color:#4CAF50;font-weight:700">✅ ${s.saveMsg}</span>`:''}
        <button class="btn-sec" onclick="doSave()">💾 下書き保存</button>
      </div></div>
      <div style="display:flex;flex-direction:column;gap:18px">`;
    GROUPS.forEach(g => {
      h += `<div><div class="sec-label">${g.t}</div><div style="display:grid;gap:10px">`;
      g.items.forEach(f => { h += rFld(f, s.jm[f.k]); });
      h += `</div></div>`;
    });
    h += `</div></div></div>`;
  }
  h += `</div>`;
  document.getElementById('single-pane').innerHTML = h;
}

// ============================================================
// BATCH MODE
// ============================================================
function renderBatch() {
  const s = S.batch;
  const PCOLS = ["施設名","職種カテゴリ名","職種名","雇用形態","給与下限","都道府県"];
  let h = `<div style="max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:12px">`;
  h += `<div class="dz${s.file?' ok':''}" onclick="document.getElementById('bfi').click()" ondrop="bDrop(event)" ondragover="event.preventDefault()">
    <input type="file" id="bfi" accept=".csv" style="display:none" onchange="bFile(this.files[0])">
    ${s.file
      ?`<div style="font-size:22px">✅</div><div style="font-weight:700;margin:6px 0;font-size:15px">${esc(s.file.name)}</div>`
      :`<div style="font-size:36px;opacity:.25">📊</div><div style="font-weight:700;margin:8px 0;font-size:16px">ハローワーク CSV をドラッグ＆ドロップ</div><div style="font-size:13px;color:#888">クリックでも選択できます（Shift-JIS / UTF-8 自動判定）<br>同一求人番号の重複行は自動で1件にまとめます</div>`}
  </div>`;
  h += `<div class="ig">
    <div class="a-info">✅ <strong>対応中：</strong> ハローワーク → ジョブメドレー（APIなし・ルールベース変換）</div>
    <div class="card" style="font-size:13px;color:#bbb;display:flex;align-items:center;gap:6px">🔜 <strong>準備中：</strong> JM → Indeed / コメディカルドットコム</div>
  </div>`;
  if (s.file) {
    h += `<div style="text-align:center">
      <button class="btn" onclick="doCnv()" ${s.conv?'disabled':''} style="font-size:15px;padding:11px 32px">
        ${s.conv?`⏳ 変換中... ${s.prog}%`:'▶　変換開始'}
      </button>
      <div style="font-size:12px;color:#888;margin-top:4px">OpenAI APIキー不要・高速ルールベース変換</div>
    </div>`;
  }
  if (s.conv) h += `<div class="card"><div class="pb"><div class="pb-fill" style="width:${s.prog}%"></div></div><div style="text-align:center;font-size:13px;color:#888;margin-top:4px">${s.done.toLocaleString()} / ${s.total.toLocaleString()} 件完了</div></div>`;
  if (s.err) h += `<div class="a-err">${esc(s.err)}</div>`;
  if (s.results.length>0) {
    h += `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-weight:700;font-size:15px">✅ ${s.results.length.toLocaleString()}件 変換完了</div>
      <button class="btn green" onclick="dlCSV(S.batch.results)" style="font-size:13px;padding:8px 18px">⬇ CSVダウンロード（UTF-8 BOM）</button>
    </div>
    <div style="overflow:auto;max-height:420px;border:1px solid #eee;border-radius:6px">
      <table><thead><tr><th>#</th>${PCOLS.map(c=>`<th>${c}</th>`).join('')}<th>HW求人番号</th></tr></thead>
      <tbody>${s.results.map((r,i)=>`<tr><td style="color:#ccc">${i+1}</td>${PCOLS.map(c=>`<td>${esc(r[c])||'—'}</td>`).join('')}<td style="color:#bbb;font-size:11px">${esc(r._HW求人番号)||'—'}</td></tr>`).join('')}</tbody>
      </table></div></div>`;
  }
  h += `</div>`;
  document.getElementById('batch-pane').innerHTML = h;
}

// ============================================================
// EVENT HANDLERS
// ============================================================
function switchTab(id) {
  ['single','batch'].forEach(t => {
    document.getElementById(`tab-${t}`).className='tab'+(t===id?' active':'');
    document.getElementById(`${t}-pane`).style.display=t===id?'':'none';
  });
  if (id==='batch') renderBatch();
}
function sDrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f)sFile(f);}
function bDrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f)bFile(f);}
function sFile(f){if(!f)return;S.single={...S.single,file:f,previewUrls:null,jm:null,miss:[],err:'',loadMsg:''};if(f.type.startsWith('image/')){const r=new FileReader();r.onload=e=>{S.single.previewUrls=[e.target.result];renderSingle();};r.readAsDataURL(f);}else{renderSingle();}}
function bFile(f){if(!f)return;S.batch={...S.batch,file:f,results:[],err:''};renderBatch();}
function updateJM(k,v){if(S.single.jm)S.single.jm[k]=v;}
function updateCat(v){if(!S.single.jm)return;S.single.jm['職種カテゴリ名']=v;
  // カテゴリ変更時、現在の職種名がそのカテゴリに無ければクリア
  const jobs=CAT_JOBS[v]||[];
  if(!jobs.includes(S.single.jm['職種名']))S.single.jm['職種名']='';
  renderSingle();}
function updateJob(v){if(!S.single.jm)return;S.single.jm['職種名']=v;
  // 掲載用テキストが空なら職種名で初期化
  if(!S.single.jm['職種名表示'])S.single.jm['職種名表示']=v;
  renderSingle();}
function toggleD(){S.single.dOpen=!S.single.dOpen;renderSingle();}
function loadD(id){const d=loadDraft(id);if(d){S.single.jm={...d};S.single.miss=[];renderSingle();}}
function rmD(id){rmDraft(id);renderSingle();}

async function doExt(){
  if(!S.single.file)return;
  S.single.loading=true;S.single.err='';S.single.loadMsg='';renderSingle();
  try{
    const file=S.single.file;
    let images;
    if(file.type==='application/pdf'){
      images=await pdfToImages(file,(p,total)=>{
        S.single.loadMsg=`PDFを画像化中... (${p}/${total}ページ)`;renderSingle();
      });
      S.single.previewUrls=images.map(im=>im.previewUrl);
      S.single.loadMsg=`${images.length}ページをAIで解析中...`;renderSingle();
    }else{
      const img=await imgToBase64(file);
      images=[img];
      S.single.previewUrls=[img.previewUrl];
    }
    const result=await callOpenAI(images);
    const{不足情報,...data}=result;
    // 職種名表示の初期化（掲載用テキスト）
    if(!data['職種名表示']&&data['職種名'])data['職種名表示']=data['職種名'];
    // 給与の検算：月給なのに低すぎる値はAI誤変換の可能性が高い
    const miss=不足情報||[];
    const emp=data['雇用形態']||'';
    const low=Number(data['給与下限']);
    if(emp!=='パート・バイト'&&low>0&&low<100000){
      miss.unshift(`⚠ 給与下限が ${low.toLocaleString()}円 と月給として低すぎます。年収を月給に誤変換している可能性があります。求人票の「月額（a+b）」の金額をご確認ください`);
    }
    S.single.jm=data;S.single.miss=miss;
  }catch(e){S.single.err=`変換エラー: ${e.message}`;}
  finally{S.single.loading=false;S.single.loadMsg='';renderSingle();}
}
function doSave(){if(!S.single.jm)return;saveDraft(S.single.jm);S.single.saveMsg='保存完了';renderSingle();setTimeout(()=>{S.single.saveMsg='';renderSingle();},2500);}

async function doCnv(){
  if(!S.batch.file)return;
  S.batch={...S.batch,conv:true,results:[],err:'',prog:0,done:0};renderBatch();
  try{
    const rows=await rdCSV(S.batch.file);
    const seen=new Map();rows.forEach(r=>{const k=r['求人番号']||JSON.stringify(r).slice(0,50);if(!seen.has(k))seen.set(k,r);});
    const uniq=Array.from(seen.values());S.batch.total=uniq.length;
    const cvt=[];const B=20;
    for(let i=0;i<uniq.length;i+=B){
      uniq.slice(i,i+B).forEach(r=>cvt.push(convertRow(r)));
      const cnt=Math.min(i+B,uniq.length);S.batch.done=cnt;S.batch.prog=Math.round(cnt/uniq.length*100);
      renderBatch();await new Promise(r=>setTimeout(r,0));
    }
    S.batch.results=cvt;
  }catch(e){S.batch.err=`エラー: ${e.message}`;}
  finally{S.batch.conv=false;renderBatch();}
}

function showApiModal(){document.getElementById('api-key-input').value=getApiKey();document.getElementById('api-modal').classList.add('show');}
function closeApiModal(){document.getElementById('api-modal').classList.remove('show');}
function saveApiKey(){
  const k=document.getElementById('api-key-input').value.trim();
  if(!k){alert('APIキーを入力してください');return;}
  if(!k.startsWith('sk-')){if(!confirm(`「${k.slice(0,8)}...」はOpenAIのAPIキー形式（sk-...）ではありませんが、保存しますか？`))return;}
  setApiKey(k);closeApiModal();updateApiBanner();
  alert('✅ APIキーを保存しました。\n\nAI変換ボタンで求人票のPDF・画像を変換できます。');
}
function updateApiBanner(){document.getElementById('api-banner').className='api-banner'+(getApiKey()?' hidden':'');}

// Init
updateApiBanner();
renderSingle();
</script>
