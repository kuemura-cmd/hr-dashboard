<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>令和6年度 病床機能報告 職員数ダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f5f5f2;color:#1a1a18;font-size:13px}
header{background:#1d4e6b;color:#fff;padding:0 18px;display:flex;align-items:center;gap:18px;height:46px}
header h1{font-size:15px;font-weight:500;letter-spacing:.02em;white-space:nowrap}
header .info{font-size:11px;opacity:.6;margin-left:auto}
/* 病院/診療所 切替 */
.type-switch{display:flex;background:rgba(255,255,255,.12);border-radius:6px;padding:3px;gap:2px}
.type-switch button{padding:5px 18px;border:none;background:none;color:#cdd9e2;font-size:13px;font-weight:600;border-radius:4px;cursor:pointer;transition:all .15s}
.type-switch button.active{background:#fff;color:#1d4e6b}
.layout{display:flex;height:calc(100vh - 46px)}
.sidebar{width:252px;min-width:252px;background:#fff;border-right:1px solid #e0dfd8;overflow-y:auto;display:flex;flex-direction:column}
.sidebar-inner{flex:1;padding-bottom:12px}
.s-section{padding:11px 14px 4px;font-size:9px;font-weight:700;color:#9aa;text-transform:uppercase;letter-spacing:.1em;border-top:1px solid #eee;margin-top:4px}
.s-section:first-child{border-top:none;margin-top:0}
.fg{padding:4px 14px}
.fg label{font-size:11px;color:#666;display:block;margin-bottom:3px}
.fg select{width:100%;padding:5px 6px;border:1px solid #ddd;border-radius:4px;font-size:12px;background:#fafaf8;color:#1a1a18}
.kind-row{display:flex;gap:4px;padding:2px 14px 4px}
.kind-row button{flex:1;padding:5px;font-size:11px;border:1px solid #ddd;border-radius:4px;background:#fafaf8;color:#666;cursor:pointer}
.kind-row button.active{background:#1d4e6b;color:#fff;border-color:#1d4e6b;font-weight:600}
.cascade-hint{font-size:10px;color:#bbb;padding:0 14px 2px;font-style:italic}
/* MultiSelect */
.ms-wrap{position:relative}
.ms-btn{width:100%;padding:5px 24px 5px 7px;border:1px solid #ddd;border-radius:4px;font-size:12px;background:#fafaf8;color:#1a1a18;cursor:pointer;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative}
.ms-btn:hover{border-color:#aaa}
.ms-btn.has-value{border-color:#1d4e6b;background:#edf4f8;font-weight:500}
.ms-btn::after{content:'▾';position:absolute;right:7px;top:50%;transform:translateY(-50%);font-size:10px;color:#888}
.ms-btn.open::after{content:'▴'}
.ms-dropdown{display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #1d4e6b;border-radius:4px;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.14);max-height:240px;overflow-y:auto}
.ms-dropdown.open{display:block}
.ms-search{padding:6px 8px;border-bottom:1px solid #eee;position:sticky;top:0;background:#fff}
.ms-search input{width:100%;padding:4px 6px;border:1px solid #ddd;border-radius:3px;font-size:11px;outline:none}
.ms-search input:focus{border-color:#1d4e6b}
.ms-item{display:flex;align-items:center;gap:6px;padding:4px 8px;cursor:pointer;font-size:12px}
.ms-item:hover{background:#f0f5f9}
.ms-item input[type=checkbox]{accent-color:#1d4e6b;cursor:pointer;flex-shrink:0}
.ms-item label{cursor:pointer;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ms-empty{padding:8px;color:#bbb;font-size:11px;text-align:center}
.ms-actions{display:flex;gap:4px;padding:5px 8px;border-top:1px solid #eee;position:sticky;bottom:0;background:#fff}
.ms-actions button{flex:1;padding:3px;font-size:10px;border:1px solid #ddd;border-radius:3px;background:#fafaf8;cursor:pointer;color:#555}
.ms-actions button:hover{background:#e8f0f7;border-color:#1d4e6b;color:#1d4e6b}
/* 職種チップ */
.shoku-chips{display:flex;flex-wrap:wrap;gap:4px;padding:2px 14px 6px}
.shoku-chip{padding:4px 9px;border-radius:13px;font-size:11px;border:1px solid #ddd;background:#fafaf8;color:#666;cursor:pointer;transition:all .12s}
.shoku-chip.active{background:#1d4e6b;color:#fff;border-color:#1d4e6b}
.shoku-mini-actions{display:flex;gap:6px;padding:0 14px 4px}
.shoku-mini-actions button{font-size:10px;border:none;background:none;color:#1d4e6b;cursor:pointer;text-decoration:underline;padding:0}
.sidebar-footer{padding:10px 14px;border-top:1px solid #eee}
.btn-reset{padding:7px 10px;background:none;border:1px solid #ccc;border-radius:4px;font-size:11px;cursor:pointer;width:100%;color:#666}
.btn-reset:hover{background:#f0efea;border-color:#1d4e6b;color:#1d4e6b}
.filter-count{font-size:10px;color:#1d4e6b;text-align:center;margin-top:5px;min-height:13px}
/* main */
.main{flex:1;overflow-y:auto;padding:14px 16px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.kpi{background:#fff;border-radius:6px;border:1px solid #e8e7e0;padding:9px 13px}
.kpi-label{font-size:10px;color:#999;margin-bottom:3px}
.kpi-value{font-size:21px;font-weight:600;color:#1d4e6b;line-height:1.15}
.kpi-sub{font-size:10px;color:#aaa;margin-top:2px}
.tab-bar{display:flex;gap:2px;margin-bottom:10px}
.tab{padding:6px 16px;border-radius:4px;font-size:12px;cursor:pointer;border:1px solid transparent;color:#777}
.tab.active{background:#1d4e6b;color:#fff}
.tab:not(.active):hover{background:#e8e7e0;color:#333}
.card{background:#fff;border-radius:6px;border:1px solid #e8e7e0;padding:12px 14px;margin-bottom:10px}
.card-title{font-size:12px;font-weight:600;color:#333;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-size:9px;background:#e8f0f7;color:#1d4e6b;padding:2px 8px;border-radius:10px;font-weight:600}
.topn-row{display:flex;align-items:center;gap:6px;margin-left:auto;font-size:11px;color:#777}
.topn-row select{padding:3px 6px;border:1px solid #ddd;border-radius:4px;font-size:11px;background:#fafaf8}
.chart-wrap{position:relative;width:100%;height:440px}
.table-wrap{overflow:auto;max-height:560px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead tr{position:sticky;top:0;background:#f5f5f2;z-index:1}
th{padding:6px 8px;text-align:right;border-bottom:1px solid #ddd;white-space:nowrap;font-weight:600;color:#666}
th:first-child,th.lcol{text-align:left}
td{padding:5px 8px;text-align:right;border-bottom:1px solid #f0f0ec;white-space:nowrap}
td:first-child,td.lcol{text-align:left}
tr:hover td{background:#f8f8f5}
tr.total-row td{background:#eef3f7;font-weight:700;border-top:1px solid #ccd}
.fac-link{color:#1d4e6b;cursor:pointer;text-decoration:underline;font-weight:500}
.fac-link:hover{color:#e07b3a}
.no-data{padding:40px;text-align:center;color:#bbb;font-size:13px}
th.sortable{cursor:pointer;user-select:none;position:relative;padding-right:16px}
th.sortable:hover{background:#e8eef3}
th.sortable::after{content:'⇅';position:absolute;right:3px;font-size:9px;color:#bbb}
th.sort-asc::after{content:'▲';color:#1d4e6b}
th.sort-desc::after{content:'▼';color:#1d4e6b}
#loading{position:fixed;inset:0;background:#f5f5f2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999}
#loading p{font-size:13px;color:#666}
.spinner{width:32px;height:32px;border:3px solid #ddd;border-top-color:#1d4e6b;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>データを展開しています...</p></div>
<header>
  <h1>令和6年度 病床機能報告 — 職員数ダッシュボード</h1>
  <div class="type-switch">
    <button id="t-hospital" class="active">病院</button>
    <button id="t-clinic">診療所</button>
  </div>
  <span class="info" id="data-info"></span>
</header>
<div class="layout">
<aside class="sidebar">
<div class="sidebar-inner">

  <div class="s-section">集計対象</div>
  <div class="fg"><label>部門</label>
    <select id="sel-dept"></select>
  </div>
  <div class="fg" style="padding-bottom:2px"><label>勤務区分（初期：常勤）</label></div>
  <div class="kind-row" id="kind-row">
    <button data-kind="常勤" class="active">常勤</button>
    <button data-kind="非常勤">非常勤</button>
    <button data-kind="両方">両方</button>
  </div>
  <div class="fg" style="padding-bottom:1px"><label>職種（集計に含める職種）</label></div>
  <div class="shoku-mini-actions">
    <button id="shoku-all">全選択</button>
    <button id="shoku-none">全解除</button>
  </div>
  <div class="shoku-chips" id="shoku-chips"></div>

  <div class="s-section">地域で絞り込み</div>
  <div class="fg"><label>都道府県</label><div class="ms-wrap" id="ms-pref"></div></div>
  <div class="fg"><label>市区町村</label><div class="ms-wrap" id="ms-city"></div></div>
  <div class="fg"><label>構想区域</label><div class="ms-wrap" id="ms-kousou"></div></div>
  <div class="fg"><label>二次医療圏</label><div class="ms-wrap" id="ms-niji"></div></div>
  <div class="fg"><label>医療機関名</label><div class="ms-wrap" id="ms-fac"></div></div>

  <div class="s-section">属性で絞り込み</div>
  <div class="fg"><label>設置主体</label><div class="ms-wrap" id="ms-setchi"></div></div>
  <div class="fg" id="dpc-fg"><label>DPC群の種類</label><div class="ms-wrap" id="ms-dpc"></div></div>

</div>
<div class="sidebar-footer">
  <button class="btn-reset" id="btn-reset">すべてリセット</button>
  <div class="filter-count" id="filter-count"></div>
</div>
</aside>

<main class="main">
  <div class="kpi-row">
    <div class="kpi"><div class="kpi-label">対象施設数</div><div class="kpi-value" id="kpi-fac">-</div><div class="kpi-sub" id="kpi-fac-sub"></div></div>
    <div class="kpi"><div class="kpi-label">合計人数</div><div class="kpi-value" id="kpi-total">-</div><div class="kpi-sub" id="kpi-total-sub"></div></div>
    <div class="kpi"><div class="kpi-label">1施設あたり平均</div><div class="kpi-value" id="kpi-avg">-</div><div class="kpi-sub">人/施設</div></div>
    <div class="kpi"><div class="kpi-label">集計条件</div><div class="kpi-value" id="kpi-cond" style="font-size:14px">-</div><div class="kpi-sub" id="kpi-cond-sub"></div></div>
  </div>
  <div class="tab-bar">
    <div class="tab active" data-tab="chart">グラフ</div>
    <div class="tab" data-tab="table">一覧表</div>
  </div>

  <div id="tab-chart">
    <div class="card">
      <div class="card-title">医療機関別 職員数 <span class="badge" id="chart-badge"></span>
        <div class="topn-row">表示件数
          <select id="topn">
            <option value="20">上位20</option>
            <option value="30" selected>上位30</option>
            <option value="50">上位50</option>
            <option value="100">上位100</option>
          </select>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="barChart"></canvas></div>
    </div>
  </div>

  <div id="tab-table" style="display:none">
    <div class="card">
      <div class="card-title">一覧表 <span class="badge" id="table-badge"></span>
        <span style="margin-left:auto;font-size:10px;color:#aaa">医療機関名をクリックで詳細を別ウィンドウ表示</span>
      </div>
      <div class="table-wrap" id="table-area"></div>
    </div>
  </div>
</main>
</div>

const COLORS=['#1d4e6b','#e07b3a','#2e8b5e','#9b4db5','#c0392b','#2980b9','#c8860a','#6c757d','#17a589','#884ea0','#1e8449','#7d6608','#a04000','#1a5276','#117a65'];

let DB=null, TYPE='hospital';
let dept='施設全体', kind='常勤';
let selShoku=new Set();      // 明示的に選択された職種（初期は全職種）
let topN=30;
let tableSort={col:'metric',dir:'desc'};

// 地域・属性フィルター：選択中の表示値Set
const FILT={pref:new Set(),city:new Set(),kousou:new Set(),niji:new Set(),fac:new Set(),setchi:new Set(),dpc:new Set()};
// フィルターkey → maps key / facility prop
const FMAP={pref:['pref','p'],city:['city','c'],kousou:['kousou','k'],niji:['niji','j'],fac:[null,'n'],setchi:['setchi','s'],dpc:['dpc','d']};

function cur(){return DB[TYPE];}

// 職員値の位置インデックス：dept|||shoku|||kind -> 配列index
let POS={};
function buildPos(){
  POS={};
  cur().keys.forEach((k,i)=>{POS[k[0]+'|||'+k[1]+'|||'+k[2]]=i;});
}

// ある施設の値（dept/kind/職種集合から合計）
function metricOf(f){
  const kinds = kind==='両方'?['常勤','非常勤']:[kind];
  let s=0;
  for(const sh of selShoku){
    for(const kd of kinds){
      const p=POS[dept+'|||'+sh+'|||'+kd];
      if(p!==undefined) s+=f.v[p];
    }
  }
  return s;
}

// 施設の表示値を取得
function facVal(f,fkey){
  const [mapKey,prop]=FMAP[fkey];
  if(prop==='n') return f.n;
  const idx=f[prop];
  if(idx===undefined||idx<0) return '';
  return cur().maps[mapKey][idx];
}

// 指定フィルターを除いた全フィルター適用済み施設リスト
function filteredFacilities(exceptKey){
  return cur().facilities.filter(f=>{
    for(const fkey of Object.keys(FILT)){
      if(fkey===exceptKey) continue;
      const set=FILT[fkey];
      if(set.size===0) continue;
      if(TYPE==='clinic'&&fkey==='dpc') continue;
      if(!set.has(facVal(f,fkey))) return false;
    }
    return true;
  });
}

// ===== MultiSelect =====
const MS={};
function createMultiSelect(wrapId,key){
  const wrap=document.getElementById(wrapId); wrap.innerHTML='';
  const btn=document.createElement('button'); btn.className='ms-btn'; btn.textContent='すべて';
  const drop=document.createElement('div'); drop.className='ms-dropdown';
  const sd=document.createElement('div'); sd.className='ms-search';
  const si=document.createElement('input'); si.type='text'; si.placeholder='検索...'; sd.appendChild(si); drop.appendChild(sd);
  const items=document.createElement('div'); items.className='ms-items'; drop.appendChild(items);
  const act=document.createElement('div'); act.className='ms-actions';
  const bn=document.createElement('button'); bn.textContent='全解除';
  act.appendChild(bn); drop.appendChild(act);
  wrap.appendChild(btn); wrap.appendChild(drop);
  const st={key,btn,drop,items,si,opts:[]};
  MS[key]=st;

  function build(list){
    items.innerHTML='';
    if(!list.length){items.innerHTML='<div class="ms-empty">該当なし</div>';return;}
    list.forEach(v=>{
      const it=document.createElement('div'); it.className='ms-item';
      const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=FILT[key].has(v);
      cb.addEventListener('change',()=>{ if(cb.checked)FILT[key].add(v); else FILT[key].delete(v); updateBtn(); onFilterChange(); });
      const lb=document.createElement('label'); lb.textContent=v;
      lb.addEventListener('click',e=>{e.preventDefault();cb.checked=!cb.checked;cb.dispatchEvent(new Event('change'));});
      it.appendChild(cb); it.appendChild(lb); items.appendChild(it);
    });
  }
  function updateBtn(){
    const s=FILT[key];
    if(s.size===0){btn.textContent='すべて';btn.classList.remove('has-value');}
    else if(s.size===1){btn.textContent=[...s][0];btn.classList.add('has-value');}
    else{btn.textContent=s.size+'件選択中';btn.classList.add('has-value');}
  }
  btn.addEventListener('click',e=>{
    e.stopPropagation();
    const open=drop.classList.contains('open');
    Object.values(MS).forEach(m=>{m.drop.classList.remove('open');m.btn.classList.remove('open');});
    if(!open){ drop.classList.add('open'); btn.classList.add('open'); si.value=''; build(st.opts); si.focus(); }
  });
  si.addEventListener('input',()=>{const q=si.value.toLowerCase(); build(st.opts.filter(v=>v.toLowerCase().includes(q)));});
  bn.addEventListener('click',e=>{e.stopPropagation(); FILT[key].clear(); build(st.opts.filter(v=>v.toLowerCase().includes(si.value.toLowerCase()))); updateBtn(); onFilterChange();});
  st.build=build; st.updateBtn=updateBtn;
  st.setOptions=(list)=>{ st.opts=list; // 選択済みのうち候補に無いものは外す
    [...FILT[key]].forEach(v=>{if(!list.includes(v))FILT[key].delete(v);}); updateBtn(); };
}
document.addEventListener('click',()=>{Object.values(MS).forEach(m=>{m.drop.classList.remove('open');m.btn.classList.remove('open');});});

// ===== カスケード：各セレクトの候補を再計算 =====
function refreshOptions(){
  Object.keys(FMAP).forEach(fkey=>{
    if(fkey==='dpc'&&TYPE==='clinic') return;
    if(!MS[fkey]) return;
    const facs=filteredFacilities(fkey);
    const vals=new Set();
    facs.forEach(f=>{const v=facVal(f,fkey); if(v) vals.add(v);});
    // maps順を維持（facのみ五十音/出現順）
    let ordered;
    const [mapKey]=FMAP[fkey];
    if(mapKey){ ordered=cur().maps[mapKey].filter(v=>vals.has(v)); }
    else { ordered=[...vals].sort(); }
    MS[fkey].setOptions(ordered);
  });
}

// ===== 職種チップ =====
function buildShoku(resetToAll){
  const el=document.getElementById('shoku-chips'); el.innerHTML='';
  const list=cur().deptShoku[dept]||[];
  if(resetToAll){ selShoku=new Set(list); }
  // 現dept範囲外を除去
  [...selShoku].forEach(s=>{if(!list.includes(s))selShoku.delete(s);});
  list.forEach(sh=>{
    const c=document.createElement('div');
    c.className='shoku-chip'+(selShoku.has(sh)?' active':'');
    c.textContent=sh;
    c.addEventListener('click',()=>{
      if(selShoku.has(sh))selShoku.delete(sh); else selShoku.add(sh);
      buildShoku(); render();
    });
    el.appendChild(c);
  });
}

// ===== 部門セレクト =====
function buildDeptSelect(){
  const sel=document.getElementById('sel-dept'); sel.innerHTML='';
  cur().depts.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;sel.appendChild(o);});
  if(!cur().depts.includes(dept)) dept=cur().depts[0];
  sel.value=dept;
}

// ===== レンダリング =====
let barChart=null;
function render(){
  const facs=filteredFacilities(null).map(f=>({f,m:metricOf(f)}));
  const withVal=facs.filter(x=>x.m>0);
  const total=facs.reduce((a,b)=>a+b.m,0);
  const kindLabel=kind;
  const fullN=(cur().deptShoku[dept]||[]).length;
  const shokuLabel = selShoku.size===0?'職種未選択' : (selShoku.size===fullN?'全職種':selShoku.size+'職種');

  // KPI
  document.getElementById('kpi-fac').textContent=facs.length.toLocaleString();
  document.getElementById('kpi-fac-sub').textContent='うち人数>0: '+withVal.length.toLocaleString();
  document.getElementById('kpi-total').textContent=total.toLocaleString();
  document.getElementById('kpi-total-sub').textContent='人';
  document.getElementById('kpi-avg').textContent=facs.length?(total/facs.length).toFixed(1):'0';
  document.getElementById('kpi-cond').textContent=dept;
  document.getElementById('kpi-cond-sub').textContent=kindLabel+' / '+shokuLabel;

  const badge=dept+'｜'+kindLabel+'｜'+shokuLabel;
  document.getElementById('chart-badge').textContent=badge;
  document.getElementById('table-badge').textContent=badge;

  const nfilt=Object.values(FILT).filter(s=>s.size>0).length;
  document.getElementById('filter-count').textContent=nfilt?nfilt+'項目で絞り込み中':'';

  renderChart(facs);
  if(document.querySelector('.tab.active').dataset.tab==='table') renderTable(facs);
}

function renderChart(facs){
  const sorted=[...facs].filter(x=>x.m>0).sort((a,b)=>b.m-a.m).slice(0,topN);
  const wrap=document.querySelector('.chart-wrap');
  if(barChart){barChart.destroy();barChart=null;}
  if(!sorted.length){
    wrap.innerHTML='<div class="no-data">該当する職員数データがありません（職種が未選択の可能性があります）</div>';
    return;
  }
  // canvasを確実に用意
  if(!document.getElementById('barChart')) wrap.innerHTML='<canvas id="barChart"></canvas>';
  const labels=sorted.map(x=>x.f.n);
  const data=sorted.map(x=>x.m);
  const ctx=document.getElementById('barChart').getContext('2d');
  barChart=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[{label:dept+' '+kind,data,backgroundColor:'#1d4e6b',borderRadius:2,maxBarThickness:30}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y.toLocaleString()+' 人'}}},
      scales:{
        x:{ticks:{font:{size:9},maxRotation:90,minRotation:55,autoSkip:false},grid:{display:false}},
        y:{beginAtZero:true,ticks:{font:{size:11},callback:v=>v.toLocaleString()},grid:{color:'#eee'}}
      }
    }
  });
}

function renderTable(facs){
  const hasDpc=cur().hasDpc;
  let rows=facs.slice();
  const sc=tableSort.col, dir=tableSort.dir==='asc'?1:-1;
  rows.sort((a,b)=>{
    let va,vb;
    if(sc==='metric'){va=a.m;vb=b.m;}
    else if(sc==='n'){va=a.f.n;vb=b.f.n;return va.localeCompare(vb,'ja')*dir;}
    else {va=facVal(a.f,sc);vb=facVal(b.f,sc);return String(va).localeCompare(String(vb),'ja')*dir;}
    return (va-vb)*dir;
  });

  function th(label,col,lc){
    const cls=(tableSort.col===col?(tableSort.dir==='asc'?'sort-asc':'sort-desc'):'')+(lc?' lcol':'');
    return `<th class="sortable ${cls}" data-col="${col}">${label}</th>`;
  }
  let h='<table><thead><tr>'
    + th('医療機関名','n',true)
    + th('都道府県','pref',true)
    + th('市区町村','city',true)
    + th('構想区域','kousou',true)
    + th('二次医療圏','niji',true)
    + th('設置主体','setchi',true)
    + (hasDpc?th('DPC群','dpc',true):'')
    + th(dept+'<br>'+kind+'人数','metric')
    + '</tr></thead><tbody>';
  let total=0;
  rows.forEach(({f,m})=>{
    total+=m;
    h+='<tr>'
      +`<td class="lcol"><span class="fac-link" data-code="${encodeURIComponent(f.n)}">${f.n}</span></td>`
      +`<td class="lcol">${facVal(f,'pref')}</td>`
      +`<td class="lcol">${facVal(f,'city')}</td>`
      +`<td class="lcol">${facVal(f,'kousou')}</td>`
      +`<td class="lcol">${facVal(f,'niji')}</td>`
      +`<td class="lcol">${facVal(f,'setchi')}</td>`
      +(hasDpc?`<td class="lcol">${facVal(f,'dpc')}</td>`:'')
      +`<td>${m.toLocaleString()}</td>`
      +'</tr>';
  });
  const ncol=hasDpc?8:7;
  h+=`<tr class="total-row"><td class="lcol">合計（${rows.length}施設）</td><td class="lcol" colspan="${ncol-2}"></td><td>${total.toLocaleString()}</td></tr>`;
  h+='</tbody></table>';
  const area=document.getElementById('table-area');
  if(!rows.length){area.innerHTML='<div class="no-data">該当する施設がありません</div>';return;}
  area.innerHTML=h;

  area.querySelectorAll('th.sortable').forEach(th=>{
    th.addEventListener('click',()=>{
      const col=th.dataset.col;
      if(tableSort.col===col)tableSort.dir=tableSort.dir==='asc'?'desc':'asc';
      else{tableSort.col=col;tableSort.dir=(col==='metric')?'desc':'asc';}
      renderTable(filteredFacilities(null).map(f=>({f,m:metricOf(f)})));
    });
  });
  area.querySelectorAll('.fac-link').forEach(el=>{
    el.addEventListener('click',()=>openDetail(decodeURIComponent(el.dataset.code)));
  });
}

// ===== 詳細ウィンドウ =====
function openDetail(name){
  const f=cur().facilities.find(x=>x.n===name);
  if(!f)return;
  const C=cur();
  const meta=[['医療機関名',f.n],['都道府県',facVal(f,'pref')],['市区町村',facVal(f,'city')],
    ['構想区域',facVal(f,'kousou')],['二次医療圏',facVal(f,'niji')],['設置主体',facVal(f,'setchi')]];
  if(C.hasDpc)meta.push(['DPC群の種類',facVal(f,'dpc')]);

  // 部門×職種 マトリクス（常勤/非常勤）
  const allShoku=[];
  C.depts.forEach(d=>C.deptShoku[d].forEach(s=>{if(!allShoku.includes(s))allShoku.push(s);}));
  // 職種順を施設全体基準に
  const order=C.deptShoku['施設全体'].concat(allShoku.filter(s=>!C.deptShoku['施設全体'].includes(s)));

  let mtx='<table class="d-mtx"><thead><tr><th>職種</th>';
  C.depts.forEach(d=>{mtx+=`<th colspan="2">${d}</th>`;});
  mtx+='</tr><tr><th></th>'+C.depts.map(()=>'<th>常勤</th><th>非常勤</th>').join('')+'</tr></thead><tbody>';
  order.forEach(sh=>{
    let any=false; let cells='';
    C.depts.forEach(d=>{
      const has=C.deptShoku[d].includes(sh);
      ['常勤','非常勤'].forEach(kd=>{
        if(!has){cells+='<td class="na">–</td>';return;}
        const p=POS[d+'|||'+sh+'|||'+kd];
        const val=p!==undefined?f.v[p]:0;
        if(val>0)any=true;
        cells+=`<td${val>0?' class="pos"':''}>${val}</td>`;
      });
    });
    mtx+=`<tr><td class="sh">${sh}</td>${cells}</tr>`;
  });
  // 合計行
  let totcells='';
  C.depts.forEach(d=>{
    ['常勤','非常勤'].forEach(kd=>{
      let s=0; C.deptShoku[d].forEach(sh=>{const p=POS[d+'|||'+sh+'|||'+kd];if(p!==undefined)s+=f.v[p];});
      totcells+=`<td class="tot">${s}</td>`;
    });
  });
  mtx+=`<tr class="totrow"><td class="sh">合計</td>${totcells}</tr>`;
  mtx+='</tbody></table>';

  const metaHtml=meta.map(([k,v])=>`<div class="mrow"><span class="mk">${k}</span><span class="mv">${v||'—'}</span></div>`).join('');
  const typeLabel=TYPE==='hospital'?'病院':'診療所';
  const doc=`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>${f.n} — 職員数詳細</title>
<style>
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f5f5f2;color:#1a1a18;margin:0;padding:20px;font-size:13px}
h2{font-size:16px;color:#1d4e6b;margin:0 0 4px}
.sub{font-size:11px;color:#999;margin-bottom:14px}
.meta{background:#fff;border:1px solid #e8e7e0;border-radius:6px;padding:12px 14px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr;gap:4px 18px}
.mrow{display:flex;gap:8px;font-size:12px;border-bottom:1px solid #f3f3ef;padding:3px 0}
.mk{color:#999;min-width:88px}
.mv{font-weight:500}
.card{background:#fff;border:1px solid #e8e7e0;border-radius:6px;padding:12px 14px}
.card h3{font-size:13px;color:#333;margin:0 0 10px}
table.d-mtx{border-collapse:collapse;font-size:11px;width:100%}
.d-mtx th{background:#1d4e6b;color:#fff;padding:4px 7px;border:1px solid #15394f;white-space:nowrap;font-weight:600}
.d-mtx th:first-child{position:sticky;left:0}
.d-mtx td{padding:4px 8px;text-align:right;border:1px solid #ececec;color:#666}
.d-mtx td.sh{text-align:left;font-weight:500;color:#1a1a18;background:#fafaf8;white-space:nowrap}
.d-mtx td.pos{color:#1a1a18;font-weight:600;background:#edf4f8}
.d-mtx td.na{color:#ddd;text-align:center}
.d-mtx td.tot{font-weight:700;color:#1d4e6b;background:#eef3f7}
.d-mtx tr.totrow td{border-top:2px solid #1d4e6b}
.note{font-size:10px;color:#aaa;margin-top:10px}
</style></head><body>
<h2>${f.n}</h2>
<div class="sub">${typeLabel}｜令和6年度 病床機能報告</div>
<div class="meta">${metaHtml}</div>
<div class="card"><h3>部門 × 職種 別 職員数（常勤・非常勤）</h3>
<div style="overflow:auto">${mtx}</div>
<div class="note">「–」は当該部門で報告区分のない職種です。数値は報告された人数です。</div>
</div>
</body></html>`;
  const w=window.open('','_blank','width=900,height=680,scrollbars=yes');
  if(!w){alert('ポップアップがブロックされました。ブラウザの設定で許可してください。');return;}
  w.document.open(); w.document.write(doc); w.document.close();
}

// ===== タイプ切替 =====
function switchType(t){
  TYPE=t; 
  Object.values(FILT).forEach(s=>s.clear());
  dept=cur().depts[0];
  document.getElementById('t-hospital').classList.toggle('active',t==='hospital');
  document.getElementById('t-clinic').classList.toggle('active',t==='clinic');
  document.getElementById('dpc-fg').style.display=cur().hasDpc?'block':'none';
  buildPos(); buildDeptSelect(); buildShoku(true);
  refreshOptions(); Object.values(MS).forEach(m=>m.build(m.opts));
  render();
}

function onFilterChange(){ refreshOptions(); render(); }

// ===== 初期化 =====
function init(){
  ['pref','city','kousou','niji','fac','setchi','dpc'].forEach(k=>createMultiSelect('ms-'+k,k));
  document.getElementById('t-hospital').addEventListener('click',()=>switchType('hospital'));
  document.getElementById('t-clinic').addEventListener('click',()=>switchType('clinic'));
  document.getElementById('sel-dept').addEventListener('change',e=>{dept=e.target.value;buildShoku(true);render();});
  document.querySelectorAll('#kind-row button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('#kind-row button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); kind=b.dataset.kind; render();
  }));
  document.getElementById('shoku-all').addEventListener('click',()=>{buildShoku(true);render();});
  document.getElementById('shoku-none').addEventListener('click',()=>{selShoku=new Set();buildShoku();render();});
  document.getElementById('topn').addEventListener('change',e=>{topN=+e.target.value;render();});
  document.getElementById('btn-reset').addEventListener('click',()=>{
    Object.values(FILT).forEach(s=>s.clear());
    dept=cur().depts[0]; document.getElementById('sel-dept').value=dept;
    kind='常勤'; document.querySelectorAll('#kind-row button').forEach(x=>x.classList.toggle('active',x.dataset.kind==='常勤'));
    buildShoku(true); refreshOptions(); Object.values(MS).forEach(m=>{m.build(m.opts);m.updateBtn();}); render();
  });
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('tab-chart').style.display=t.dataset.tab==='chart'?'block':'none';
    document.getElementById('tab-table').style.display=t.dataset.tab==='table'?'block':'none';
    render();
  }));

  document.getElementById('dpc-fg').style.display=cur().hasDpc?'block':'none';
  buildPos(); buildDeptSelect(); buildShoku(true);
  refreshOptions(); Object.values(MS).forEach(m=>m.build(m.opts));
  const h=cur(),c=DB.clinic;
  document.getElementById('data-info').textContent=`病院 ${DB.hospital.facilities.length.toLocaleString()}施設 / 診療所 ${c.facilities.length.toLocaleString()}施設`;
  render();
}

// データ展開
try{
  const bin=Uint8Array.from(atob(DATA_B64),c=>c.charCodeAt(0));
  const json=pako.ungzip(bin,{to:'string'});
  DB=JSON.parse(json);
  document.getElementById('loading').style.display='none';
  init();
}catch(e){
  document.getElementById('loading').innerHTML='<p style="color:#c0392b">データの展開に失敗しました：'+e.message+'</p>';
}
</script>
</body>
</html>
