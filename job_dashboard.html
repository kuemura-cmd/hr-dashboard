<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>医師求人 分析ダッシュボード｜m3.com CAREER</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f5f5f2;color:#1a1a18;font-size:13px}
header{background:#1d4e6b;color:#fff;padding:10px 20px;display:flex;align-items:center;gap:12px;height:44px}
header h1{font-size:15px;font-weight:600;letter-spacing:.03em}
header span{font-size:11px;opacity:.7;margin-left:auto}
.layout{display:flex;min-height:calc(100vh - 44px)}
.sidebar{width:250px;min-width:250px;background:#fff;border-right:1px solid #e0dfd8;overflow-y:auto;max-height:calc(100vh - 44px);position:sticky;top:44px}
.s-section{padding:10px 14px 3px;font-size:9px;font-weight:700;color:#9aa;text-transform:uppercase;letter-spacing:.1em;border-top:1px solid #eee;margin-top:4px}
.s-section:first-child{border-top:none;margin-top:0}
.fg{padding:5px 14px}
.fg label{font-size:11px;color:#666;display:block;margin-bottom:4px}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:4px 10px;border:1px solid #ddd;border-radius:999px;font-size:11.5px;background:#fafaf8;color:#555;cursor:pointer;transition:all .12s;white-space:nowrap}
.chip:hover{border-color:#1d4e6b;color:#1d4e6b}
.chip.on{background:#1d4e6b;border-color:#1d4e6b;color:#fff;font-weight:600}
.dept-box{max-height:118px;overflow-y:auto;transition:max-height .2s;border:1px solid #eee;border-radius:6px;padding:5px}
.dept-box.open{max-height:420px}
.dept-more{font-size:10.5px;color:#1d4e6b;background:none;border:none;cursor:pointer;text-decoration:underline;padding:4px 0;margin-top:2px}
select{width:100%;padding:5px 8px;border:1px solid #ddd;border-radius:5px;font-size:12px;background:#fafaf8}
.tog{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px;color:#555;cursor:pointer}
.tog input{accent-color:#1d4e6b}
.s-foot{padding:12px 14px;border-top:1px solid #eee}
.btn-reset{width:100%;padding:7px;background:none;border:1px solid #ccc;border-radius:6px;font-size:12px;cursor:pointer;color:#666}
.btn-reset:hover{border-color:#1d4e6b;color:#1d4e6b;background:#f0efea}

.main{flex:1;overflow-y:auto;padding:14px 16px}
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:12px}
.kpi{background:#fff;border-radius:7px;border:1px solid #e8e7e0;padding:9px 11px}
.kpi-label{font-size:10px;color:#999;margin-bottom:3px}
.kpi-value{font-size:19px;font-weight:700;color:#1d4e6b;line-height:1.1}
.kpi-value small{font-size:11px;font-weight:600;color:#888}
.tab-bar{display:flex;gap:3px;margin-bottom:10px}
.tab{padding:6px 16px;border-radius:6px;font-size:12px;cursor:pointer;color:#777;border:1px solid transparent}
.tab.active{background:#1d4e6b;color:#fff}
.tab:not(.active):hover{background:#e8e7e0;color:#333}
.row{display:grid;gap:10px;margin-bottom:10px}
.c2{grid-template-columns:1fr 1fr}.c1{grid-template-columns:1fr}.c3{grid-template-columns:2fr 1fr}
.card{background:#fff;border-radius:7px;border:1px solid #e8e7e0;padding:12px 14px}
.card-title{font-size:12px;font-weight:600;color:#333;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.card-title .badge{font-size:9px;background:#e8f0f7;color:#1d4e6b;padding:2px 8px;border-radius:10px;font-weight:600}
.chart-wrap{position:relative;width:100%}
table{width:100%;border-collapse:collapse;font-size:11.5px}
thead tr{background:#f5f5f2}
th{padding:6px 8px;text-align:right;border-bottom:1px solid #ddd;white-space:nowrap;font-weight:600;color:#666}
th:first-child{text-align:left}
td{padding:5px 8px;text-align:right;border-bottom:1px solid #f0f0ec;white-space:nowrap}
td:first-child{text-align:left;font-weight:500;color:#333}
tr:hover td{background:#f8f8f5}
tr.total td{background:#eef3f7;font-weight:700}
.bar-cell{position:relative}
.bar-cell .b{position:absolute;left:0;top:0;bottom:0;background:#1d4e6b22;z-index:0}
.bar-cell span{position:relative;z-index:1}
.no-data{padding:40px;text-align:center;color:#bbb}
.table-wrap{max-height:420px;overflow:auto}
#loading{position:fixed;inset:0;background:#f5f5f2;display:flex;align-items:center;justify-content:center;z-index:99;color:#666}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(3,1fr)}.c2,.c3{grid-template-columns:1fr}.sidebar{position:static;max-height:none}.layout{flex-direction:column}.sidebar{width:100%}}
</style>
</head>

<div id="loading">読み込み中...</div>

</aside>

<main class="main">
  <div class="kpi-row">

    <div class="kpi"><div class="kpi-label">当直なし比率</div><div class="kpi-value" id="k-toku">-<small>%</small></div></div>
    <div class="kpi"><div class="kpi-label">募集科目数</div><div class="kpi-value" id="k-dept">-</div></div>
  </div>

  <div class="tab-bar">
    <div class="tab active" data-tab="overview">概要</div>
    <div class="tab" data-tab="salary">年収分析</div>
    <div class="tab" data-tab="dept">科目別</div>
  </div>

  <div id="tab-overview">
    <div class="row c2">
      <div class="card"><div class="card-title">都道府県別 求人件数</div><div class="chart-wrap" style="height:300px"><canvas id="c-pref"></canvas></div></div>
      <div class="card"><div class="card-title">区分別 構成</div><div class="chart-wrap" style="height:300px"><canvas id="c-ku"></canvas></div></div>
    </div>
    <div class="row c2">
      <div class="card"><div class="card-title">施設形態別 構成</div><div class="chart-wrap" style="height:260px"><canvas id="c-shisetsu"></canvas></div></div>
      <div class="card"><div class="card-title">当直・オンコール（なしの割合）</div><div class="chart-wrap" style="height:260px"><canvas id="c-cond"></canvas></div></div>
    </div>
  </div>

  <div id="tab-salary" style="display:none">
    <div class="row c1">
      <div class="card"><div class="card-title">年収帯分布（下限ベース） <span class="badge" id="sal-n"></span></div><div class="chart-wrap" style="height:280px"><canvas id="c-salhist"></canvas></div></div>
    </div>
    <div class="row c2">
      <div class="card"><div class="card-title">都道府県別 平均年収（下限）</div><div class="chart-wrap" style="height:300px"><canvas id="c-salpref"></canvas></div></div>
      <div class="card"><div class="card-title">募集科目別 平均年収（下限・件数3以上）</div><div class="table-wrap" id="t-saldept"></div></div>
    </div>
  </div>

  <div id="tab-dept" style="display:none">
    <div class="row c1">
      <div class="card"><div class="card-title">募集科目別 年収のばらつき（箱ひげ／上位20科目・件数3以上）<span class="badge">箱=Q1〜Q3 / 橙線=中央値 / ひげ=最小〜最大</span></div><div class="chart-wrap" style="height:520px"><canvas id="c-deptbox"></canvas></div></div>
    </div>
    <div class="row c1">
      <div class="card"><div class="card-title">都道府県 × 区分 件数</div><div class="table-wrap" id="t-pivot"></div></div>
    </div>
  </div>
</main>
</div>

function chipFactory(container,values,set,cb){
  const c=$(container);c.innerHTML='';
  values.forEach(v=>{
    const e=document.createElement('span');e.className='chip';e.textContent=v;
    e.addEventListener('click',()=>{set.has(v)?set.delete(v):set.add(v);e.classList.toggle('on');if(cb)cb();render();});
    c.appendChild(e);
  });
}

function buildCityChips(){
  const c=$('f-city');c.innerHTML='';
  const list=(META.cities||[]).filter(x=>state.pref.size===0||state.pref.has(x.pref));
  // 表示されない市区町村が選択済みなら解除
  const shown=new Set(list.map(x=>x.name));
  [...state.city].forEach(n=>{if(!shown.has(n))state.city.delete(n);});
  list.forEach(x=>{
    const e=document.createElement('span');e.className='chip'+(state.city.has(x.name)?' on':'');e.textContent=x.name;
    e.addEventListener('click',()=>{state.city.has(x.name)?state.city.delete(x.name):state.city.add(x.name);e.classList.toggle('on');render();});
    c.appendChild(e);
  });
}

function filtered(){
  return RECS.filter(r=>{
    if(state.active && r.status==='possibly_closed')return false;
    if(state.ku.size && !state.ku.has(r.ku))return false;
    if(state.pref.size && !state.pref.has(r.pref))return false;
    if(state.city.size && !state.city.has(r.city))return false;
    if(state.shisetsu.size && !state.shisetsu.has(r.shisetsu))return false;
    if(state.dept.size && !r.depts.some(d=>state.dept.has(d)))return false;

    if(state.toku && !r.toku_nashi)return false;
    if(state.oc && !r.oc_nashi)return false;
    return true;
  });
}

function countBy(arr,keyFn){
  const m=new Map();
  arr.forEach(r=>{const k=keyFn(r);if(k===''||k==null)return;m.set(k,(m.get(k)||0)+1);});
  return [...m.entries()].sort((a,b)=>b[1]-a[1]);
}
function avg(nums){return nums.length?nums.reduce((a,b)=>a+b,0)/nums.length:0;}
function median(nums){if(!nums.length)return 0;const s=[...nums].sort((a,b)=>a-b);const m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;}

}
function makeDoughnut(canvasId,labels,data){
  if(charts[canvasId])charts[canvasId].destroy();

function quantile(s,p){const i=(s.length-1)*p,lo=Math.floor(i),hi=Math.ceil(i);return lo===hi?s[lo]:s[lo]+(s[hi]-s[lo])*(i-lo);}

      ctx.save();
      ctx.strokeStyle='#1d4e6b';ctx.lineWidth=1.2;
      ctx.beginPath();ctx.moveTo(xMin,y);ctx.lineTo(xMax,y);ctx.stroke();           // ひげ
      ctx.beginPath();ctx.moveTo(xMin,y-h/3);ctx.lineTo(xMin,y+h/3);                // 端キャップ
      ctx.moveTo(xMax,y-h/3);ctx.lineTo(xMax,y+h/3);ctx.stroke();
      ctx.strokeStyle='#e07b3a';ctx.lineWidth=2.4;
      ctx.beginPath();ctx.moveTo(xMed,y-h/2);ctx.lineTo(xMed,y+h/2);ctx.stroke();   // 中央値
      ctx.restore();
    });
  }};
  charts['c-deptbox']=new Chart($('c-deptbox'),{
    type:'bar',
    data:{labels,datasets:[{data:boxData,backgroundColor:'#1d4e6b2e',borderColor:'#1d4e6b',borderWidth:1,borderSkipped:false}]},
    plugins:[whiskPlugin],
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{
        title:items=>stats[items[0].dataIndex].d,
        label:c=>{const s=stats[c.dataIndex];return [
          `中央値 ${Math.round(s.med).toLocaleString()}万円`,
          `Q1–Q3: ${Math.round(s.q1).toLocaleString()}–${Math.round(s.q3).toLocaleString()}万円`,
          `最小–最大: ${s.min.toLocaleString()}–${s.max.toLocaleString()}万円`,
          `件数 n=${s.n}`];}
      }}},
      scales:{x:{min:Math.max(0,allMin-100),max:allMax+100,ticks:{font:{size:10},callback:v=>v+'万'},grid:{color:'#f0f0ec'}},
              y:{ticks:{font:{size:10}},grid:{display:false}}}}
  });
}

function render(){
  const rows=filtered();
  // KPI
  $('k-total').textContent=rows.length.toLocaleString();
  $('k-hosp').textContent=new Set(rows.map(r=>r.hosp).filter(Boolean)).size.toLocaleString();
  const sals=rows.map(r=>r.salary).filter(v=>v);
  $('k-sal').innerHTML=(sals.length?Math.round(avg(sals)):'-')+'<small>万</small>';
  $('k-med').innerHTML=(sals.length?Math.round(median(sals)):'-')+'<small>万</small>';
  const tokuRate=rows.length?Math.round(rows.filter(r=>r.toku_nashi).length/rows.length*100):0;
  $('k-toku').innerHTML=tokuRate+'<small>%</small>';
  $('k-dept').textContent=new Set(rows.flatMap(r=>r.depts)).size;

  // 概要
  const prefC=countBy(rows,r=>r.pref).slice(0,20);
  makeBar('c-pref',prefC.map(x=>x[0]),prefC.map(x=>x[1]));
  const kuC=countBy(rows,r=>r.ku);
  makeDoughnut('c-ku',kuC.map(x=>x[0]),kuC.map(x=>x[1]));
  const shC=countBy(rows,r=>r.shisetsu).slice(0,10);
  makeDoughnut('c-shisetsu',shC.map(x=>x[0]),shC.map(x=>x[1]));
  const tokuN=rows.filter(r=>r.toku_nashi).length,ocN=rows.filter(r=>r.oc_nashi).length;
  if(charts['c-cond'])charts['c-cond'].destroy();
  charts['c-cond']=new Chart($('c-cond'),{type:'bar',
    data:{labels:['当直なし','当直あり/不明','オンコールなし','OCあり/不明'],
      datasets:[{data:[tokuN,rows.length-tokuN,ocN,rows.length-ocN],
      backgroundColor:['#2e8b5e','#cfd8d6','#2980b9','#cfd8d6'],borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:'#f0f0ec'}},x:{grid:{display:false},ticks:{font:{size:10}}}}}});

  // 年収
  const bins=[[0,1000],[1000,1200],[1200,1500],[1500,1800],[1800,2000],[2000,99999]];
  const binLabels=['〜1000','1000-1200','1200-1500','1500-1800','1800-2000','2000〜'];
  const binData=bins.map(([lo,hi])=>sals.filter(s=>s>=lo&&s<hi).length);
  makeBar('c-salhist',binLabels,binData,false,COLORS[1]);
  $('sal-n').textContent=`年収記載 ${sals.length} 件`;
  // 都道府県別平均年収
  const prefSal={};
  rows.forEach(r=>{if(r.salary){(prefSal[r.pref]=prefSal[r.pref]||[]).push(r.salary);}});
  const ps=Object.entries(prefSal).map(([k,v])=>[k,Math.round(avg(v)),v.length]).filter(x=>x[2]>=1).sort((a,b)=>b[1]-a[1]).slice(0,20);
  makeBar('c-salpref',ps.map(x=>x[0]),ps.map(x=>x[1]),true,COLORS[2]);
  // 科目別平均年収table
  const deptSal={};
  rows.forEach(r=>{if(r.salary)r.depts.forEach(d=>{(deptSal[d]=deptSal[d]||[]).push(r.salary);});});
  const ds=Object.entries(deptSal).map(([k,v])=>[k,Math.round(avg(v)),v.length]).filter(x=>x[2]>=3).sort((a,b)=>b[1]-a[1]);
  let h='<table><thead><tr><th>募集科目</th><th>平均年収(万)</th><th>件数</th></tr></thead><tbody>';
  h+=ds.map(x=>`<tr><td>${x[0]}</td><td>${x[1].toLocaleString()}</td><td>${x[2]}</td></tr>`).join('')||'<tr><td colspan=3 class="no-data">データなし</td></tr>';
  h+='</tbody></table>';$('t-saldept').innerHTML=h;

  // 科目別 年収の箱ひげ（ローソク足風）
  renderDeptBox(rows);

  // 都道府県×区分 pivot
  const prefs=[...new Set(rows.map(r=>r.pref).filter(Boolean))];
  const kus=[...new Set(rows.map(r=>r.ku).filter(Boolean))];
  const piv={};prefs.forEach(p=>{piv[p]={};kus.forEach(k=>piv[p][k]=0);});
  rows.forEach(r=>{if(r.pref&&r.ku)piv[r.pref][r.ku]++;});
  const prefOrder=prefs.map(p=>[p,kus.reduce((s,k)=>s+piv[p][k],0)]).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
  let ph=`<table><thead><tr><th>都道府県</th>${kus.map(k=>`<th>${k}</th>`).join('')}<th>計</th></tr></thead><tbody>`;
  prefOrder.forEach(p=>{const tot=kus.reduce((s,k)=>s+piv[p][k],0);
    ph+=`<tr><td>${p}</td>${kus.map(k=>`<td>${piv[p][k]||'-'}</td>`).join('')}<td>${tot}</td></tr>`;});
  const colTot=kus.map(k=>prefs.reduce((s,p)=>s+piv[p][k],0));
  ph+=`<tr class="total"><td>計</td>${colTot.map(v=>`<td>${v}</td>`).join('')}<td>${colTot.reduce((a,b)=>a+b,0)}</td></tr>`;
  ph+='</tbody></table>';$('t-pivot').innerHTML=prefOrder.length?ph:'<div class="no-data">データなし</div>';
}

function init(){
  $('data-info').textContent=`${META.source||''} ・ 全${META.total.toLocaleString()}件`;
  chipFactory('f-ku',META.kubuns,state.ku);
  chipFactory('f-pref',META.prefs,state.pref,buildCityChips);
  buildCityChips();
  chipFactory('f-dept',META.depts,state.dept);
  chipFactory('f-shisetsu',META.shisetsus,state.shisetsu);

  $('dept-more').addEventListener('click',()=>{const b=$('f-dept');b.classList.toggle('open');$('dept-more').textContent=b.classList.contains('open')?'▲ 折りたたむ':'▼ もっと広げる';});
  $('f-salary').addEventListener('change',e=>{state.salary=+e.target.value;render();});
  $('t-toku').addEventListener('change',e=>{state.toku=e.target.checked;render();});
  $('t-oc').addEventListener('change',e=>{state.oc=e.target.checked;render();});
  $('t-active').addEventListener('change',e=>{state.active=e.target.checked;render();});
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
    ['overview','salary','dept'].forEach(n=>$('tab-'+n).style.display=t.dataset.tab===n?'block':'none');
  }));
  $('reset').addEventListener('click',()=>{
    state.ku.clear();state.pref.clear();state.city.clear();state.dept.clear();state.shisetsu.clear();
    state.salary=0;state.toku=false;state.oc=false;state.active=true;
    document.querySelectorAll('.chip.on').forEach(c=>c.classList.remove('on'));
    $('f-salary').value='0';$('t-toku').checked=false;$('t-oc').checked=false;$('t-active').checked=true;
    buildCityChips();
    render();
  });
  $('loading').style.display='none';
  render();
}
init();
</script>
</body>
</html>
