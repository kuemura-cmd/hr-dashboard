<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>人件費配賦マスタ_ダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f5f5f2;color:#1a1a18;font-size:14px;padding-bottom:80px}

/* ヘッダー */
.header{background:#1d4e6b;color:#fff;padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:14px;font-weight:500;line-height:1.3}
.header-sub{font-size:10px;opacity:0.65;margin-top:2px}

/* フィルターパネル（下部固定） */
.filter-panel{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0dfd8;z-index:200;transition:transform 0.3s ease}
.filter-panel.collapsed{transform:translateY(calc(100% - 52px))}
.filter-toggle{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;background:#fff}
.filter-toggle-label{font-size:13px;font-weight:600;color:#1d4e6b;display:flex;align-items:center;gap:6px}
.filter-toggle-label::before{content:'⚙';font-size:14px}
.filter-badge{background:#1d4e6b;color:#fff;font-size:10px;padding:2px 7px;border-radius:10px}
.filter-toggle-arrow{font-size:12px;color:#aaa;transition:transform 0.3s}
.filter-panel:not(.collapsed) .filter-toggle-arrow{transform:rotate(180deg)}
.filter-body{padding:0 16px 16px;max-height:50vh;overflow-y:auto}

/* フィルター項目 */
.filter-row{margin-bottom:10px}
.filter-row label{font-size:11px;color:#888;display:block;margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
.filter-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 12px;border-radius:20px;font-size:12px;border:1px solid #ddd;background:#fafaf8;cursor:pointer;color:#555;transition:all 0.15s;white-space:nowrap}
.chip.active{background:#1d4e6b;color:#fff;border-color:#1d4e6b}
.chip:active{opacity:0.7}
.filter-actions{display:flex;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid #eee}
.btn-reset{flex:1;padding:9px;background:none;border:1px solid #ccc;border-radius:6px;font-size:12px;cursor:pointer;color:#666}
.btn-reset:active{background:#f0efea}

/* メインコンテンツ */
.main{padding:12px 14px}

/* KPIカード */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:#fff;border-radius:8px;border:1px solid #e8e7e0;padding:10px 12px}
.kpi-label{font-size:10px;color:#999;margin-bottom:2px}
.kpi-value{font-size:22px;font-weight:700;color:#1d4e6b;line-height:1.1}
.kpi-diff{font-size:11px;margin-top:2px}
.kpi-diff.up{color:#2e8b5e}.kpi-diff.down{color:#c0392b}.kpi-diff.flat{color:#aaa}

/* タブ */
.tab-bar{display:flex;background:#fff;border-radius:8px;border:1px solid #e8e7e0;padding:3px;margin-bottom:12px}
.tab{flex:1;padding:8px 4px;text-align:center;font-size:12px;cursor:pointer;border-radius:6px;color:#777;transition:all 0.15s}
.tab.active{background:#1d4e6b;color:#fff;font-weight:600}

/* カード */
.card{background:#fff;border-radius:8px;border:1px solid #e8e7e0;padding:12px;margin-bottom:10px}
.card-title{font-size:12px;font-weight:600;color:#333;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.badge{font-size:9px;background:#e8f0f7;color:#1d4e6b;padding:2px 7px;border-radius:10px}
.legend{display:flex;flex-wrap:wrap;gap:4px 10px;margin-bottom:6px;font-size:11px;color:#555}
.li{display:flex;align-items:center;gap:3px}
.ld{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* FY月選択 */
.fy-section{background:#fff;border-radius:8px;border:1px solid #e8e7e0;padding:10px 12px;margin-bottom:10px}
.fy-section-title{font-size:11px;color:#888;font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em}
.fy-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.fy-btn{padding:6px 14px;border-radius:20px;font-size:12px;border:1px solid #ddd;background:#fafaf8;cursor:pointer;color:#555}
.fy-btn.active{background:#1d4e6b;color:#fff;border-color:#1d4e6b}
.month-chips{display:flex;flex-wrap:wrap;gap:5px}
.month-chip{padding:5px 10px;border-radius:16px;font-size:11px;border:1px solid #ddd;background:#fafaf8;cursor:pointer;color:#555}
.month-chip.active{background:#1d4e6b;color:#fff;border-color:#1d4e6b}

/* ピボットテーブル */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:300px}
thead tr{background:#f0f4f8}
th{padding:6px 8px;text-align:right;border-bottom:2px solid #ddd;white-space:nowrap;font-weight:700;color:#1d4e6b;font-size:10px}
th:first-child{text-align:left}
td{padding:5px 8px;text-align:right;border-bottom:1px solid #f0f0ec;white-space:nowrap}
td:first-child{text-align:left;font-weight:500;color:#333;font-size:11px}
tr.total-row td{background:#eef3f7;font-weight:700;border-top:1px solid #ccd}
tr.dim-header td{background:#e8f0f7;font-weight:700;color:#1d4e6b;font-size:10px}
.no-data{padding:30px;text-align:center;color:#bbb;font-size:13px}

/* ローディング */
#loading{position:fixed;inset:0;background:#f5f5f2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999}
#loading p{font-size:13px;color:#666}
.spinner{width:36px;height:36px;border:3px solid #ddd;border-top-color:#1d4e6b;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* グラフ内訳切り替え */
.group-select{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.group-btn{padding:5px 10px;border-radius:14px;font-size:11px;border:1px solid #ddd;background:#fafaf8;cursor:pointer;color:#555}
.group-btn.active{background:#e8f0f7;color:#1d4e6b;border-color:#1d4e6b;font-weight:600}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>データを読み込み中...</p></div>

<div class="header">
  <div>
    <div class="h1">人件費配賦マスタ</div>
    <div class="header-sub" id="data-info">支給あり・常勤</div>
  </div>
</div>

<div class="main" id="main-content">

  <!-- 期間選択 -->
  <div class="fy-section">
    <div class="fy-section-title">表示期間</div>
    <div class="fy-btns" id="fy-btns"></div>
    <div class="month-chips" id="month-chips"></div>
  </div>

  <!-- KPI -->
  <div class="kpi-row">
    <div class="kpi"><div class="kpi-label">常勤換算（最新月）</div><div class="kpi-value" id="kpi-fte">-</div><div class="kpi-diff" id="kpi-diff">-</div></div>
    <div class="kpi"><div class="kpi-label">対象レコード数</div><div class="kpi-value" id="kpi-records">-</div></div>
  </div>

  <!-- タブ -->
  <div class="tab-bar">
    <div class="tab active" data-tab="trend">月次推移</div>
    <div class="tab" data-tab="pivot">ピボット</div>
  </div>

  <!-- 月次推移 -->
  <div id="tab-trend">
    <div class="card">
      <div class="card-title">
        常勤換算 月次推移
        <span class="badge" id="chart-badge">事業別</span>
      </div>
      <div class="group-select" id="group-select"></div>
      <div id="trend-legend" class="legend"></div>
      <div style="position:relative;height:240px"><canvas id="trendChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">最新月 — 職種大分類</div>
      <div id="pie-legend" class="legend"></div>
      <div style="position:relative;height:200px"><canvas id="pieChart"></canvas></div>
    </div>
  </div>

  <!-- ピボット -->
  <div id="tab-pivot" style="display:none">
    <div class="card">
      <div class="card-title">常勤換算合計 <span class="badge" id="pivot-badge"></span></div>
      <div class="group-select" id="pivot-row-select"></div>
      <div class="table-wrap" id="pivot-table"></div>
    </div>
  </div>

</div>

<!-- フィルターパネル（下部） -->
<div class="filter-panel collapsed" id="filter-panel">
  <div class="filter-toggle" id="filter-toggle">
    <div class="filter-toggle-label">絞り込み <span class="filter-badge" id="filter-badge" style="display:none">0</span></div>
    <span class="filter-toggle-arrow">▲</span>
  </div>
  <div class="filter-body">
    <div class="filter-row">
      <label>エリア</label>
      <div class="filter-chips" id="chips-area"></div>
    </div>
    <div class="filter-row">
      <label>事業</label>
      <div class="filter-chips" id="chips-jigyou"></div>
    </div>
    <div class="filter-row">
      <label>職種大分類</label>
      <div class="filter-chips" id="chips-shoku-dai"></div>
    </div>
    <div class="filter-row">
      <label>職種分類</label>
      <div class="filter-chips" id="chips-shoku-bun"></div>
    </div>
    <div class="filter-actions">
      <button class="btn-reset" id="btn-reset">リセット</button>
    </div>
  </div>
</div>

<script>
const COLORS=['#1d4e6b','#e07b3a','#2e8b5e','#9b4db5','#c0392b','#2980b9','#c8860a','#6c757d','#17a589','#884ea0','#1e8449','#7d6608'];
let RAW=null, trendChart=null, pieChart=null;
let selectedMonths=new Set(), activeFilters={area:new Set(),jigyou:new Set(),'shoku-dai':new Set(),'shoku-bun':new Set()};
let groupBy='事業', pivotDim='事業';

function getFY(m){const r=m.match(/(\d{4})年(\d{1,2})月/);if(!r)return null;const y=+r[1],mo=+r[2];return mo>=4?y:y-1;}
function getFYLabel(fy){return `FY${fy}`;}
function getCI(){const o={};RAW.cols.forEach((c,i)=>o[c]=i);return o;}
function sumFte(rows){const CI=getCI();let s=0;rows.forEach(r=>{const v=r[CI['_fte']];if(v!==null&&v!==-1)s+=v;});return s/100;}

function getActiveMonthIdxs(){
  const all=RAW.maps['月CD'];
  if(selectedMonths.size===0)return all.map((_,i)=>i);
  return all.map((m,i)=>selectedMonths.has(m)?i:null).filter(i=>i!==null);
}

function filterRows(){
  const CI=getCI(), MAPS=RAW.maps;
  const activeIdxSet=new Set(getActiveMonthIdxs());
  const colMap={'area':'エリア','jigyou':'事業','shoku-dai':'職種大分類','shoku-bun':'職種分類'};
  return RAW.rows.filter(r=>{
    if(!activeIdxSet.has(r[CI['月CD']]))return false;
    for(const[fk,col]of Object.entries(colMap)){
      const s=activeFilters[fk];
      if(s.size>0){
        const codes=new Set([...s].map(v=>(MAPS[col]||[]).indexOf(v)).filter(i=>i>=0));
        if(!codes.has(r[CI[col]]))return false;
      }
    }
    return true;
  });
}

// ===== FY・月選択UI =====
function buildPeriodUI(){
  const months=RAW.maps['月CD'];
  const fyGroups={};
  months.forEach((m,i)=>{const fy=getFY(m);if(!fyGroups[fy])fyGroups[fy]=[];fyGroups[fy].push({m,i});});

  const fyEl=document.getElementById('fy-btns');
  const mcEl=document.getElementById('month-chips');
  fyEl.innerHTML=''; mcEl.innerHTML='';

  Object.keys(fyGroups).sort().forEach(fy=>{
    const btn=document.createElement('div');
    btn.className='fy-btn';
    btn.textContent=getFYLabel(+fy);
    btn.addEventListener('click',()=>{
      const fms=fyGroups[fy].map(x=>x.m);
      const allSel=fms.every(m=>selectedMonths.size===0||selectedMonths.has(m));
      if(allSel&&selectedMonths.size>0){fms.forEach(m=>selectedMonths.delete(m));}
      else{
        if(selectedMonths.size===0)months.forEach(m=>selectedMonths.add(m));
        fms.forEach(m=>selectedMonths.add(m));
        const nonFY=months.filter(m=>!fms.includes(m));
        nonFY.forEach(m=>selectedMonths.delete(m));
        if(selectedMonths.size===months.length)selectedMonths.clear();
      }
      updatePeriodUI(); render();
    });
    fyEl.appendChild(btn);
  });

  months.forEach(m=>{
    const r=m.match(/\d{4}年(\d{1,2})月/);
    const chip=document.createElement('div');
    chip.className='month-chip'; chip.dataset.month=m;
    chip.textContent=r?`${r[1]}月`:m;
    chip.addEventListener('click',()=>{
      if(selectedMonths.size===0)months.forEach(x=>selectedMonths.add(x));
      if(selectedMonths.has(m))selectedMonths.delete(m);
      else selectedMonths.add(m);
      if(selectedMonths.size===months.length)selectedMonths.clear();
      updatePeriodUI(); render();
    });
    mcEl.appendChild(chip);
  });
  updatePeriodUI();
}

function updatePeriodUI(){
  const months=RAW.maps['月CD'];
  const fyGroups={};
  months.forEach(m=>{const fy=getFY(m);if(!fyGroups[fy])fyGroups[fy]=[];fyGroups[fy].push(m);});

  document.querySelectorAll('.month-chip').forEach(c=>{
    c.classList.toggle('active',selectedMonths.size===0||selectedMonths.has(c.dataset.month));
  });
  document.querySelectorAll('.fy-btn').forEach(b=>{
    const fy=+b.textContent.replace('FY','');
    const fms=fyGroups[fy]||[];
    const allSel=selectedMonths.size===0?true:fms.every(m=>selectedMonths.has(m));
    b.classList.toggle('active',allSel);
  });
}

// ===== チップフィルターUI =====
function buildChips(elId, filterKey, mapKey){
  const el=document.getElementById(elId);
  el.innerHTML='';
  const vals=RAW.maps[mapKey]||[];
  vals.forEach(v=>{
    const chip=document.createElement('div');
    chip.className='chip'+(activeFilters[filterKey].has(v)?' active':'');
    chip.textContent=v;
    chip.addEventListener('click',()=>{
      if(activeFilters[filterKey].has(v))activeFilters[filterKey].delete(v);
      else activeFilters[filterKey].add(v);
      chip.classList.toggle('active');
      updateFilterBadge(); render();
    });
    el.appendChild(chip);
  });
}

function updateFilterBadge(){
  const n=Object.values(activeFilters).reduce((s,x)=>s+x.size,0);
  const badge=document.getElementById('filter-badge');
  badge.textContent=n; badge.style.display=n>0?'inline':'none';
}

// ===== レンダリング =====
function renderKPI(rows){
  const CI=getCI(), months=RAW.maps['月CD'];
  const idxs=getActiveMonthIdxs();
  const li=idxs[idxs.length-1], pi=idxs.length>=2?idxs[idxs.length-2]:null;
  const lf=sumFte(rows.filter(r=>r[CI['月CD']]===li));
  const pf=pi!==null?sumFte(rows.filter(r=>r[CI['月CD']]===pi)):null;
  const diff=pf!==null?lf-pf:null, diffPct=(pf&&pf>0)?diff/pf*100:null;
  document.getElementById('kpi-fte').textContent=lf.toFixed(2);
  document.getElementById('kpi-records').textContent=rows.length.toLocaleString();
  if(diff!==null){
    const sign=diff>=0?'+':'',cls=diff>0?'up':diff<0?'down':'flat';
    document.getElementById('kpi-diff').textContent=`前月比 ${sign}${diffPct.toFixed(1)}%`;
    document.getElementById('kpi-diff').className='kpi-diff '+cls;
  }
  const activeMs=idxs.map(i=>months[i]);
  const fySet=new Set(activeMs.map(getFY).filter(Boolean));
  document.getElementById('data-info').textContent=
    `支給あり・常勤 | ${[...fySet].sort().map(getFYLabel).join('・')} (${activeMs.length}ヶ月)`;
}

function renderTrend(rows){
  const CI=getCI(), months=RAW.maps['月CD'];
  const idxs=getActiveMonthIdxs();
  const activeMs=idxs.map(i=>months[i]);
  document.getElementById('chart-badge').textContent=groupBy;

  let datasets;
  if(!groupBy||groupBy==='合計'){
    const data=idxs.map(mi=>+sumFte(rows.filter(r=>r[CI['月CD']]===mi)).toFixed(2));
    datasets=[{label:'合計',data,backgroundColor:COLORS[0]+'bb',borderColor:COLORS[0],borderWidth:2,fill:true,tension:0.3}];
  } else {
    const vals=RAW.maps[groupBy]||[];
    datasets=vals.map((gv,gi)=>{
      const data=idxs.map(mi=>+sumFte(rows.filter(r=>r[CI['月CD']]===mi&&r[CI[groupBy]]===gi)).toFixed(2));
      if(!data.some(v=>v>0))return null;
      return{label:gv,data,backgroundColor:COLORS[gi%COLORS.length]+'99',borderColor:COLORS[gi%COLORS.length],borderWidth:2,fill:false,tension:0.3};
    }).filter(Boolean);
  }

  document.getElementById('trend-legend').innerHTML=datasets.map(ds=>`<span class="li"><span class="ld" style="background:${ds.borderColor}"></span>${ds.label}</span>`).join('');
  const ctx=document.getElementById('trendChart').getContext('2d');
  if(trendChart)trendChart.destroy();
  trendChart=new Chart(ctx,{
    type:'bar',
    data:{labels:activeMs.map(m=>{const r=m.match(/\d{4}年(\d{1,2})月/);return r?`${r[1]}月`:m;}),datasets},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y.toFixed(2)}`}}},scales:{x:{stacked:true,ticks:{font:{size:10}},grid:{display:false}},y:{stacked:true,ticks:{font:{size:10},callback:v=>v.toLocaleString()},grid:{color:'#eee'}}}}
  });
}

function renderPie(rows){
  const CI=getCI(), idxs=getActiveMonthIdxs();
  const li=idxs[idxs.length-1];
  const lr=rows.filter(r=>r[CI['月CD']]===li);
  const vals=RAW.maps['職種大分類']||[];
  const data=vals.map((_,i)=>+sumFte(lr.filter(r=>r[CI['職種大分類']]===i)).toFixed(2));
  const active=vals.map((_,i)=>data[i]>0);
  const labels=vals.filter((_,i)=>active[i]), aData=data.filter((_,i)=>active[i]);
  const colors=vals.map((_,i)=>COLORS[i%COLORS.length]).filter((_,i)=>active[i]);
  const total=aData.reduce((a,b)=>a+b,0);
  document.getElementById('pie-legend').innerHTML=labels.map((l,i)=>`<span class="li"><span class="ld" style="background:${colors[i]}"></span>${l} ${total>0?(aData[i]/total*100).toFixed(0):0}%</span>`).join('');
  const ex=Chart.getChart('pieChart'); if(ex)ex.destroy();
  new Chart(document.getElementById('pieChart').getContext('2d'),{
    type:'doughnut',
    data:{labels,datasets:[{data:aData,backgroundColor:colors,borderWidth:1,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${c.parsed.toFixed(2)}`}}}}
  });
}

function renderPivot(rows){
  const CI=getCI(), months=RAW.maps['月CD'];
  const idxs=getActiveMonthIdxs();
  const activeMs=idxs.map(i=>months[i]);
  const vals=RAW.maps[pivotDim]||[], ri=CI[pivotDim];
  document.getElementById('pivot-badge').textContent=`${pivotDim} × 月（月平均）`;

  const data=vals.map((rv,rIdx)=>{
    const md=idxs.map(mi=>+sumFte(rows.filter(r=>r[CI['月CD']]===mi&&r[ri]===rIdx)).toFixed(2));
    const nonZero=md.filter(v=>v>0);
    const avg=nonZero.length>0?+(md.reduce((a,b)=>a+b,0)/nonZero.length).toFixed(2):0;
    return{label:rv,months:md,total:avg};
  }).filter(d=>d.total>0);

  if(!data.length){document.getElementById('pivot-table').innerHTML='<div class="no-data">データがありません</div>';return;}

  const gt=idxs.map(mi=>+sumFte(rows.filter(r=>r[CI['月CD']]===mi)).toFixed(2));
  const gtAvg=gt.filter(v=>v>0).reduce((a,b)=>a+b,0)/gt.filter(v=>v>0).length;

  let h=`<table><thead><tr><th>項目</th>${activeMs.map(m=>{const r=m.match(/\d{4}年(\d{1,2})月/);return`<th>${r?r[1]+'月':m}</th>`;}).join('')}<th>月平均</th></tr></thead><tbody>`;
  data.forEach(d=>{h+=`<tr><td>${d.label}</td>${d.months.map(v=>`<td>${v>0?v.toFixed(1):'-'}</td>`).join('')}<td>${d.total.toFixed(1)}</td></tr>`;});
  h+=`<tr class="total-row"><td>合計</td>${gt.map(v=>`<td>${v.toFixed(1)}</td>`).join('')}<td>${gtAvg.toFixed(1)}</td></tr></tbody></table>`;
  document.getElementById('pivot-table').innerHTML=h;
}

function render(){
  const rows=filterRows();
  renderKPI(rows); renderTrend(rows); renderPie(rows);
  if(document.querySelector('.tab.active')?.dataset.tab==='pivot')renderPivot(rows);
}

function init(){
  buildPeriodUI();

  // フィルターチップ生成
  buildChips('chips-area','area','エリア');
  buildChips('chips-jigyou','jigyou','事業');
  buildChips('chips-shoku-dai','shoku-dai','職種大分類');
  buildChips('chips-shoku-bun','shoku-bun','職種分類');

  // グラフ内訳切り替えボタン
  const groupOpts=['合計','エリア','事業','職種大分類'];
  const gEl=document.getElementById('group-select');
  groupOpts.forEach(opt=>{
    const btn=document.createElement('div');
    btn.className='group-btn'+(opt==='事業'?' active':'');
    btn.textContent=opt; btn.dataset.val=opt==='合計'?'':opt;

    selectedMonths.clear();
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    updateFilterBadge(); updatePeriodUI(); render();
  });

  render();
}
